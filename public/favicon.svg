<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Magnifying glass circle -->
  <circle cx="70" cy="70" r="55" fill="none" stroke="#1f2937" stroke-width="8"/>
  
  <!-- Handle -->
  <line x1="110" y1="110" x2="160" y2="160" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Center highlight (accent) -->
  <circle cx="70" cy="70" r="15" fill="#3b82f6" opacity="0.8"/>
</svg>
